syntax = "proto3";

package auth.v1;

option go_package = "github.com/Ahmad-mufied/monolith-vs-microservice-thesis/proto/gen/auth/v1;authv1";

// AuthService owns user and authentication data.
//
// Owned database:
// - auth_db
//
// Owned table:
// - users
service AuthService {
  // Register creates a new user.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Login authenticates a user and returns a JWT token.
  //
  // Benchmark 1:
  // - CPU-bound workload
  // - bcrypt password comparison
  // - JWT signing
  rpc Login(LoginRequest) returns (LoginResponse);

  // GetUserById returns a single user by UUID.
  rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse);

  // GetUsersByIds returns multiple users by UUID.
  //
  // Used by Transaction Service for enriched transaction responses.
  rpc GetUsersByIds(GetUsersByIdsRequest) returns (GetUsersByIdsResponse);
}

message UserSummary {
  // UUID string generated by PostgreSQL uuidv7().
  string id = 1;

  string name = 2;
  string email = 3;
}

message RegisterRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  UserSummary user = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  UserSummary user = 2;
}

message GetUserByIdRequest {
  // UUID string.
  string user_id = 1;
}

message GetUserByIdResponse {
  UserSummary user = 1;
}

message GetUsersByIdsRequest {
  // UUID strings.
  repeated string user_ids = 1;
}

message GetUsersByIdsResponse {
  repeated UserSummary users = 1;
}
