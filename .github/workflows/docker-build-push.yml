name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: monolith
            dockerfile: monolith/Dockerfile
          - name: api-gateway
            dockerfile: microservices/api-gateway/Dockerfile
          - name: auth-service
            dockerfile: microservices/auth-service/Dockerfile
          - name: item-service
            dockerfile: microservices/item-service/Dockerfile
          - name: transaction-service
            dockerfile: microservices/transaction-service/Dockerfile
          - name: seed-runner
            dockerfile: seed/Dockerfile
          - name: k6-runner
            dockerfile: k6/runner/Dockerfile
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Image Tag env
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
