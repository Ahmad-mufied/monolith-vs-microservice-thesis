apiVersion: v1
kind: ResourceQuota
metadata:
  name: msa-resource-quota
  namespace: msa
spec:
  hard:
    requests.cpu: "4000m"
    requests.memory: "4096Mi"
    limits.cpu: "4000m"
    limits.memory: "4096Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: msa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 9
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
