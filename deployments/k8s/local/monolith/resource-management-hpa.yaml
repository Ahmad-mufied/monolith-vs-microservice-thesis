apiVersion: v1
kind: ResourceQuota
metadata:
  name: mono-resource-quota
  namespace: mono
spec:
  hard:
    requests.cpu: "15800m"
    requests.memory: "27648Mi"
    limits.cpu: "15800m"
    limits.memory: "27648Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: monolith
  namespace: mono
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: monolith
  minReplicas: 2
  maxReplicas: 4
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
