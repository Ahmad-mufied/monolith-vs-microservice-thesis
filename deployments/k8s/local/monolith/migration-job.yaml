apiVersion: batch/v1
kind: Job
metadata:
  name: monolith-migration-job
  namespace: mono
spec:
  backoffLimit: 3
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: skripsi/monolith:local
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: monolith-config
            - secretRef:
                name: monolith-env
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - /bin/sh
            - -ec
            - goose -dir /app/migrations postgres "$DATABASE_URL" up
