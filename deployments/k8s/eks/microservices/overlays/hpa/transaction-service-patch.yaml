apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: msa
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: transaction-service
          resources:
            requests:
              cpu: 500m
              memory: 960Mi
            limits:
              cpu: 975m
              memory: 1920Mi
