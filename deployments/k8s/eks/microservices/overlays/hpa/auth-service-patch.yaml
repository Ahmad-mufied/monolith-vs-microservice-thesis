apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: msa
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: auth-service
          resources:
            requests:
              cpu: 2000m
              memory: 3456Mi
            limits:
              cpu: 3500m
              memory: 5184Mi
