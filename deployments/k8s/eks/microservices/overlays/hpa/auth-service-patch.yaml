apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: msa
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: auth-service
          resources:
            requests:
              cpu: 500m
              memory: 864Mi
            limits:
              cpu: 1000m
              memory: 1728Mi
