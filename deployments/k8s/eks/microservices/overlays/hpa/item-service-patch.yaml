apiVersion: apps/v1
kind: Deployment
metadata:
  name: item-service
  namespace: msa
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: item-service
          resources:
            requests:
              cpu: 200m
              memory: 432Mi
            limits:
              cpu: 460m
              memory: 864Mi
