apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: msa
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: auth-service
          resources:
            requests:
              cpu: 1500m
              memory: 2592Mi
            limits:
              cpu: 4000m
              memory: 6912Mi
