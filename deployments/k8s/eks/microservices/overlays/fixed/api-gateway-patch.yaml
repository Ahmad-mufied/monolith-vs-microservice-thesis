apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: msa
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api-gateway
          resources:
            requests:
              cpu: 750m
              memory: 864Mi
            limits:
              cpu: 2500m
              memory: 3456Mi
