apiVersion: batch/v1
kind: Job
metadata:
  name: seed-monolith-benchmark-data-job
  namespace: mono
spec:
  backoffLimit: 3
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: REPLACE_WITH_ECR_IMAGE
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: monolith-env
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - /usr/local/bin/seed-runner
            - seed-monolith-data
            - --dataset=benchmark
            - --database-url=$(DATABASE_URL)
