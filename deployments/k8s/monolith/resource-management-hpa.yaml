apiVersion: v1
kind: ResourceQuota
metadata:
  name: mono-resource-quota
  namespace: mono
spec:
  hard:
    requests.cpu: "4000m"
    requests.memory: "4096Mi"
    limits.cpu: "4000m"
    limits.memory: "4096Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: monolith
  namespace: mono
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: monolith
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
