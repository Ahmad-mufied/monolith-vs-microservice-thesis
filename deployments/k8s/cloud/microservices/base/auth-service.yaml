apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        benchmark.skripsi.dev/architecture: microservices
        tags.datadoghq.com/env: benchmark
        tags.datadoghq.com/service: auth-service
        tags.datadoghq.com/version: 05209db-bcryptfix2
    spec:
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        node-group: app
        architecture: msa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: benchmark.skripsi.dev/architecture
                      operator: In
                      values:
                        - microservices
                topologyKey: kubernetes.io/hostname
      containers:
        - name: auth-service
          image: REPLACE_WITH_AUTH_SERVICE_ECR_IMAGE
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
          env:
            - name: DATADOG_ENABLED
              value: "true"
            - name: DD_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/env']
            - name: DD_SERVICE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/service']
            - name: DD_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/version']
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_TRACE_ENABLED
              value: "true"
            - name: DD_TAGS
              value: "architecture:microservices"
          ports:
            - name: grpc
              containerPort: 50051
          startupProbe:
            tcpSocket:
              port: grpc
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: msa
spec:
  selector:
    app: auth-service
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-headless
  namespace: msa
spec:
  clusterIP: None
  selector:
    app: auth-service
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
