apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: item-service
  namespace: msa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: item-service
  minReplicas: 1
  maxReplicas: 4
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
