apiVersion: batch/v1
kind: Job
metadata:
  name: k6-benchmark-microservices
  namespace: benchmark
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6-benchmark
        benchmark.skripsi.dev/architecture: microservices
    spec:
      serviceAccountName: k6-runner
      restartPolicy: Never
      nodeSelector:
        node-group: testing
      tolerations:
        - key: workload
          operator: Equal
          value: benchmark
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k6
          image: REPLACE_WITH_ECR_IMAGE
          imagePullPolicy: IfNotPresent
          workingDir: /work
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          command:
            - /bin/bash
            - -lc
            - ./k6/runner/run-k6.sh
          env:
            - name: BASE_URL
              value: http://api-gateway.msa.svc.cluster.local:8080
            - name: K6_SCRIPT
              value: login.js
            - name: K6_PROFILE
              value: steady
            - name: ARCHITECTURE
              value: microservices
            - name: SCENARIO_NAME
              value: login
            - name: DATASET
              value: benchmark
            - name: DATASET_VERSION
              value: v1
            - name: RUN_ID
              value: eks-run-001
            - name: ATTEMPT
              value: attempt-01
            - name: TARGET_RPS
              value: "1000"
            - name: TEST_DURATION
              value: 5m
            - name: PRE_ALLOCATED_VUS
              value: "200"
            - name: MAX_VUS
              value: "2000"
            - name: DATADOG_ENABLED
              value: "true"
            - name: DATADOG_ENV
              value: benchmark
            - name: K6_STATSD_ADDR
              value: datadog.datadog.svc.cluster.local:8125
            - name: K6_STATSD_NAMESPACE
              value: k6
            - name: K6_STATSD_ENABLE_TAGS
              value: "true"
            - name: S3_URI
              value: s3://replace-me/experiments/eks-run-001/microservices/login/1000rps/attempt-01/
            - name: IMAGE_TAG
              value: "05209db-bcryptfix2"
            - name: APP_NODE_POOL
              value: app-nodes
            - name: TESTING_NODE_POOL
              value: testing-nodes
            - name: IMAGES_JSON
              value: '{}'
            - name: SEED_SIZE_JSON
              value: '{"users":100,"items":100,"transactions":0}'
            - name: INFRA_CONFIGURATION_JSON
              value: '{"provider":"aws","region":"ap-southeast-1","eks_cluster":"skripsi-msa","app_node_pool":"app-nodes","testing_node_pool":"testing-nodes","postgres_version":"18"}'
            - name: RESOURCES_CONFIGURATION_JSON
              value: '{"autoscaling_mode":"fixed","hpa_enabled":false,"namespace_resource_quota":{"cpu":"15800m","memory":"27648Mi"},"services":{"api-gateway":{"cpu_request":"500m","cpu_limit":"2000m","memory_request":"864Mi","memory_limit":"3456Mi","replica_count":1},"auth-service":{"cpu_request":"1500m","cpu_limit":"4000m","memory_request":"2592Mi","memory_limit":"6912Mi","replica_count":1},"item-service":{"cpu_request":"1000m","cpu_limit":"3000m","memory_request":"1728Mi","memory_limit":"5184Mi","replica_count":1},"transaction-service":{"cpu_request":"2000m","cpu_limit":"6800m","memory_request":"3456Mi","memory_limit":"12096Mi","replica_count":1}}}'
            - name: APP_RESOURCE_QUOTA_JSON
              value: '{"cpu":"15800m","memory":"27648Mi"}'
            - name: HPA_TARGET_CPU_JSON
              value: '70'
            - name: ADMIN_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k6-runner-secret
                  key: ADMIN_AUTH_TOKEN
                  optional: true
            - name: ADMIN_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: k6-runner-secret
                  key: ADMIN_USER_EMAIL
                  optional: true
            - name: ADMIN_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: k6-runner-secret
                  key: ADMIN_USER_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: 1200m
              memory: 2048Mi
            limits:
              cpu: 1500m
              memory: 3584Mi
          volumeMounts:
            - name: work-tmp
              mountPath: /work/tmp
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: work-tmp
          emptyDir: {}
        - name: tmp
          emptyDir: {}
